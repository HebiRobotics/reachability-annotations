/*
 * Protobuf messages mapping to the consolidated GraalVM Reachability Metadata Specification (v1.2.0).
 *
 * This structure maps directly to a single unified 'reachability-metadata.json' file,
 * which should be output to:
 * 'META-INF/native-image/<group.id>/<artifact.id>/reachability-metadata.json'
 *
 * Reference JSON Schema:
 * https://graalvm.org
 */

syntax = "proto2";
package us.hebi.graalvm.config.schema.v1_2_0;
option java_package = "us.hebi.graalvm.config.schema.v1_2_0";
option java_generate_equals_and_hash = true;
option java_multiple_files = true;

// The root wrapper object of a v1.2.0 reachability-metadata.json file.
message ReachabilityMetadata {
  // Types and members registered for execution via standard Java Reflection.
  repeated ReflectionEntry reflection = 1;

  // Provided solely for backward compatibility. Modern environments process
  // JNI types directly inside the reflection array via 'jniAccessible = true'.
  repeated ReflectionEntry jni = 2;

  // File paths and match patterns included inside the final executable binary.
  repeated ResourceEntry resources = 3;

  // Groups of fully qualified interfaces that dynamic proxies implement.
  repeated ProxyEntry proxies = 4;

  // Stream types registered for standard Object Serialization (java.io.Serializable).
  repeated SerializationEntry serialization = 5;

  // Fully qualified base names of Resource Bundles to embed.
  repeated BundleEntry bundles = 6;
}

// Global activation condition block.
message Condition {
  // The entry activates ONLY when this fully qualified class type is loaded and reached at runtime.
  optional string typeReached = 1;
}

// Mapped entries inside the "reflection" array section.
message ReflectionEntry {
  // Required condition targeting when this reflection registration becomes active.
  optional Condition condition = 1;

  // Fully qualified name of the target class or array type.
  optional string type = 2;

  // Specific method signatures registered for programmatic reflection invocation.
  repeated MethodIdentifier methods = 3;

  // Specific method signatures registered strictly for lookup tracking without invocation.
  repeated MethodIdentifier queriedMethods = 4;

  // Specific field signatures registered for lookups, reads, or state modification.
  repeated FieldIdentifier fields = 5;

  // Register internal elements returned by java.lang.Class#getDeclaredClasses.
  optional bool allDeclaredClasses = 6 [default = false];

  // Register internal methods returned by java.lang.Class#getDeclaredMethods.
  optional bool allDeclaredMethods = 7 [default = false];

  // Register internal fields returned by java.lang.Class#getDeclaredFields.
  optional bool allDeclaredFields = 8 [default = false];

  // Register internal constructors returned by java.lang.Class#getDeclaredConstructors.
  optional bool allDeclaredConstructors = 9 [default = false];

  // Register elements returned by java.lang.Class#getClasses.
  optional bool allPublicClasses = 10 [default = false];

  // Register elements returned by java.lang.Class#getMethods.
  optional bool allPublicMethods = 11 [default = false];

  // Register elements returned by java.lang.Class#getFields.
  optional bool allPublicFields = 12 [default = false];

  // Register elements returned by java.lang.Class#getConstructors.
  optional bool allPublicConstructors = 13 [default = false];

  // Register components returned by java.lang.Class#getRecordComponents.
  optional bool allRecordComponents = 14 [default = false];

  // Register subclasses returned by java.lang.Class#getPermittedSubclasses.
  optional bool allPermittedSubclasses = 15 [default = false];

  // Register members returned by java.lang.Class#getNestMembers.
  optional bool allNestMembers = 16 [default = false];

  // Register identity arrays returned by java.lang.Class#getSigners.
  optional bool allSigners = 17 [default = false];

  // Register lookups returned by java.lang.Class#getDeclaredMethods.
  optional bool queryAllDeclaredMethods = 18 [default = false];

  // Register lookups returned by java.lang.Class#getDeclaredConstructors.
  optional bool queryAllDeclaredConstructors = 19 [default = false];

  // Register lookups returned by java.lang.Class#getMethods.
  optional bool queryAllPublicMethods = 20 [default = false];

  // Register lookups returned by java.lang.Class#getConstructors.
  optional bool queryAllPublicConstructors = 21 [default = false];

  // Explicitly allow objects of this class to be constructed via Unsafe#allocateInstance.
  optional bool unsafeAllocated = 22 [default = false];

  // Instructs GraalVM that these specific fields/methods are accessible via Native JNI Code.
  optional bool jniAccessible = 23 [default = false];

  message MethodIdentifier {
    optional Condition condition = 1;
    // Name of the method or constructor (use "<init>" for constructors).
    optional string name = 2;
    // Parameter types array, e.g. ["java.lang.String", "int[]"].
    repeated string parameterTypes = 3;
  }

  message FieldIdentifier {
    optional Condition condition = 1;
    // Name of the field.
    optional string name = 2;
  }
}

// Global matching entries inside the "resources" array.
message ResourceEntry {
  // Required condition tag controlling pattern application.
  optional Condition condition = 1;

  // Unified routing path using glob syntax (e.g. "assets/**.png" or "META-INF/services/*").
  optional string glob = 2;
}

// Multi-interface dynamic proxy declarations inside the "proxies" array.
message ProxyEntry {
  // Required condition controlling when this proxy allocation is evaluated.
  optional Condition condition = 1;

  // Array of fully qualified interface class names that the generated dynamic proxy must implement.
  repeated string classes = 2;
}

// Serialization definitions inside the "serialization" array.
message SerializationEntry {
  // Required condition controlling metadata allocation.
  optional Condition condition = 1;

  // Fully qualified name of the class type registered for standard Java Serialization streams.
  optional string type = 2;
}

// Resource translation and localization tracking bundles inside the "bundles" array.
message BundleEntry {
  // Optional registration condition trigger.
  optional Condition condition = 1;

  // Fully qualified base name of the Resource Bundle asset, e.g. "com.example.Messages".
  optional string name = 2;

  // Array of specific locale string tags to embed, e.g. ["en", "fr_FR", "de"].
  repeated string locales = 3;

  // Array of fully qualified explicit bundle class implementation names.
  repeated string classNames = 4;
}