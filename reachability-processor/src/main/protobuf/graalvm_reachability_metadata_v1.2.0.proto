/*
 * TODO: generated by LLM based on the JSON schema and was not yet verified
 *
 * Protobuf messages mapping to the consolidated GraalVM Reachability Metadata Specification (v1.2.0).
 *
 * This structure maps directly to a single unified 'reachability-metadata.json' file,
 * which should be output to:
 * 'META-INF/native-image/<group.id>/<artifact.id>/reachability-metadata.json'
 *
 * Reference JSON Schema:
 * https://www.graalvm.org/docs/reference-manual/native-image/assets/reachability-metadata-schema-v1.2.0.json
 */

syntax = "proto2";
package graalvm.metadata.v1_2_0;
option java_package = "us.hebi.graalvm.reachability.processor.metadata.schema.v1_2_0";
option java_generate_equals_and_hash = true;
option java_multiple_files = true;

// JSON schema for the reachability metadata used by GraalVM Native Image v1.2.0
message ReachabilityMetadata {

  // Metadata to ensure elements are accessible via reflection
  repeated ReflectionEntry reflection = 1;

  // Metadata to ensure resources are accessible
  repeated ResourceEntry resources = 2;

}

// Condition used to determine if the element will be accessible at run time
message Condition {
  // Type descriptor of a class that must be reached in order to allow access to the element
  // TODO: TypeDescriptor can also be a complex type (e.g. proxy or lambda), but that can't be mapped to a single field
  required string typeReached = 1;
}

// Elements that should be registered for reflection for a specified type
message ReflectionEntry {

  // Required condition targeting when this reflection registration becomes active.
  optional Condition condition = 1;

  // Type descriptor of the class that should be registered for reflection
  // TODO: TypeDescriptor can also be a complex type (e.g. proxy or lambda), but that can't be mapped to a single field
  required string type = 2;

  message MethodDescriptor {
    // Name of the method (use "init" for constructors)
    optional string name = 2;
    // List of the method's parameter types
    repeated string parameterTypes = 3;
  }

  // List of methods that should be registered for the declared type
  repeated MethodDescriptor methods = 3;

  message FieldDescriptor {
    // Name of the field that should be registered for reflection
    required string name = 2;
  }

  // Specific field signatures registered for lookups, reads, or state modification.
  repeated FieldDescriptor fields = 4;

  // Register all declared methods from the type for reflective invocation
  optional bool allDeclaredMethods = 5 [default = false];

  // Register all declared fields from the type for reflective access
  optional bool allDeclaredFields = 6 [default = false];

  // Register all declared constructors from the type for reflective invocation
  optional bool allDeclaredConstructors = 7 [default = false];

  // Register all public methods from the type for reflective invocation
  optional bool allPublicMethods = 8 [default = false];

  // Register all public fields from the type for reflective access
  optional bool allPublicFields = 9 [default = false];

  // Register all public constructors from the type for reflective invocation
  optional bool allPublicConstructors = 10 [default = false];

  // Allow objects of this class to be instantiated with a call to jdk.internal.misc.Unsafe#allocateInstance or JNI's AllocObject
  optional bool unsafeAllocated = 11 [default = false];

  // Allow objects of this class to be serialized and deserialized
  optional bool serializable = 12 [default = false];

  // Register the type, including all registered fields and methods, for runtime JNI access
  optional bool jniAccessible = 13 [default = false];

}

// Global matching entries inside the "resources" array.
message ResourceEntry {
  // Required condition tag controlling pattern application.
  optional Condition condition = 1;

  // Module containing the resource
  optional string module = 2 [default=""];

  oneof globOrBundle {
    // Resource name or pattern matching multiple resources (accepts * and ** wildcards)
    string glob = 3;

    // Resource bundle name
    string bundle = 4;
  }

}

// Multi-interface dynamic proxy declarations inside the "proxies" array.
message ProxyEntry {
  // Required condition controlling when this proxy allocation is evaluated.
  optional Condition condition = 1;

  // Array of fully qualified interface class names that the generated dynamic proxy must implement.
  repeated string classes = 2;
}

// Serialization definitions inside the "serialization" array.
message SerializationEntry {
  // Required condition controlling metadata allocation.
  optional Condition condition = 1;

  // Fully qualified name of the class type registered for standard Java Serialization streams.
  optional string type = 2;
}

// Resource translation and localization tracking bundles inside the "bundles" array.
message BundleEntry {
  // Optional registration condition trigger.
  optional Condition condition = 1;

  // Fully qualified base name of the Resource Bundle asset, e.g. "com.example.Messages".
  optional string name = 2;

  // Array of specific locale string tags to embed, e.g. ["en", "fr_FR", "de"].
  repeated string locales = 3;

  // Array of fully qualified explicit bundle class implementation names.
  repeated string classNames = 4;
}